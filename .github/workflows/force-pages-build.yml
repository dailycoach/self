name: Force GitHub Pages rebuild

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

concurrency:
  group: "force-pages-build"
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Request Pages rebuild from latest default branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Requesting Pages rebuild for ${REPOSITORY}"
          response_code=$(curl --silent --show-error --location \
            --output /tmp/pages-build-response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")
          cat /tmp/pages-build-response.json || true
          echo "HTTP ${response_code}"
          test "${response_code}" = "201"
