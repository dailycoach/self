name: Force GitHub Pages rebuild

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "force-pages-build"
  cancel-in-progress: false

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request Pages rebuild from latest default branch
        id: request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set +e
          response_code=$(curl --silent --show-error --location \
            --output /tmp/pages-build-response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")
          response_body=$(cat /tmp/pages-build-response.json 2>/dev/null || true)
          export RESPONSE_CODE="${response_code}"
          export RESPONSE_BODY="${response_body}"
          python - <<'PY'
          import json, os, datetime
          payload = {
              "workflow": "force-pages-build",
              "repository": os.environ["REPOSITORY"],
              "sourceSha": os.environ["SOURCE_SHA"],
              "httpStatus": int(os.environ.get("RESPONSE_CODE", "0")),
              "response": os.environ.get("RESPONSE_BODY", ""),
              "requestedAt": datetime.datetime.now(datetime.timezone.utc).isoformat()
          }
          with open("deploy-status.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY
          echo "response_code=${response_code}" >> "$GITHUB_OUTPUT"

      - name: Save deployment response
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy-status.json
          git commit -m "chore: record Pages deploy response [skip ci]" || exit 0
          git push

      - name: Verify request accepted
        run: test "${{ steps.request.outputs.response_code }}" = "201"
